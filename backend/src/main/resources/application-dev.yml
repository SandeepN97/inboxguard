spring:
  datasource:
    url: jdbc:h2:mem:inboxguard;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true

gmail:
  credentials-path: ${GMAIL_CREDENTIALS_PATH:./credentials.json}
  token-encryption-key: ${GMAIL_TOKEN_ENCRYPTION_KEY}

logging:
  level:
    com.inboxguard: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO

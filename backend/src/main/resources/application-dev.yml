spring:
  datasource:
    url: jdbc:h2:mem:inboxguard;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
  # Override OAuth2 client for dev — real credentials not required when app.dev-auth=true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-placeholder}

gmail:
  client-id: ${GOOGLE_CLIENT_ID:dev-placeholder}
  client-secret: ${GOOGLE_CLIENT_SECRET:dev-placeholder}
  token-encryption-key: ${GMAIL_TOKEN_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

app:
  dev-auth: true # Permit all requests; /api/auth/me returns mock user

logging:
  level:
    com.inboxguard: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO

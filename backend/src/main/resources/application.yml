spring:
  application:
    name: inboxguard
  threads:
    virtual:
      enabled: true # Project Loom — non-blocking Gmail I/O without reactive overhead
  security:
    oauth2:
      client:
        provider:
          google:
            # access_type=offline gets a refresh token; prompt=consent forces it on repeat logins
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?access_type=offline&prompt=consent
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile, https://www.googleapis.com/auth/gmail.modify
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

server:
  port: 8080
  error:
    include-message: never # Never leak exception messages to HTTP responses
    include-stacktrace: never
    include-binding-errors: never
  servlet:
    session:
      cookie:
        same-site: lax # Defense-in-depth: blocks cross-site form submission CSRF
        http-only: true # JS cannot read the session cookie (only the XSRF-TOKEN cookie)

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

gmail:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  token-encryption-key: ${GMAIL_TOKEN_ENCRYPTION_KEY}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  dev-auth: false

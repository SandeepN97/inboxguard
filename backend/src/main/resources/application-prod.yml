spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: false # Require clean migration history in prod

gmail:
  credentials-path: ${GMAIL_CREDENTIALS_PATH}
  token-encryption-key: ${GMAIL_TOKEN_ENCRYPTION_KEY}

logging:
  level:
    com.inboxguard: INFO
    root: WARN

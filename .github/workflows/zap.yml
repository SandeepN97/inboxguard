name: OWASP ZAP — DAST

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 2" # Weekly — Tuesday 03:00 UTC

jobs:
  zap-scan:
    name: ZAP Full Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inboxguard
          POSTGRES_USER: inboxguard
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build backend
        working-directory: backend
        run: mvn -B package -DskipTests --no-transfer-progress

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/inboxguard
          DATABASE_USERNAME: inboxguard
          DATABASE_PASSWORD: ci_test_password
          GMAIL_TOKEN_ENCRYPTION_KEY: ci-test-encryption-key-32bytes!!
          GMAIL_CREDENTIALS_PATH: /dev/null
        run: |
          java -jar target/*.jar \
            --spring.profiles.active=prod &
          echo $! > /tmp/app.pid
          # Wait for Spring Boot to be ready
          timeout 60 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 2; done'

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false

      - name: Stop backend
        if: always()
        run: kill "$(cat /tmp/app.pid)" || true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json

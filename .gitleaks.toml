title = "InboxGuard — Gitleaks Secret Scanning Config"

[extend]
useDefault = true

[[rules]]
id = "gmail-authorized-user-credential"
description = "Gmail credentials.json content committed"
regex = '"type":\s*"authorized_user"'
severity = "CRITICAL"
tags = ["gmail", "oauth2", "credentials"]

[[rules]]
id = "gmail-token-encryption-key-hardcoded"
description = "Gmail token encryption key hardcoded in source"
regex = 'GMAIL_TOKEN_ENCRYPTION_KEY\s*[=:]\s*[A-Za-z0-9+/]{20,}'
severity = "CRITICAL"
tags = ["gmail", "encryption", "aes"]

[[rules]]
id = "spring-datasource-password"
description = "Spring datasource password hardcoded"
regex = 'spring\.datasource\.password\s*=\s*\S+'
severity = "HIGH"
tags = ["spring", "database"]
paths = { exclude = ["**/application-dev.yml", "**/application-test.yml"] }

[allowlist]
description = "Paths that are safe to skip"
paths = [
    '''docs/''',
    '''\.md$''',
    '''\.gitleaks\.toml''',
]